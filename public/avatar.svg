<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid lines to match developer portfolio theme -->
  <path d="M 0 40 L 400 40 M 0 80 L 400 80 M 0 120 L 400 120 M 0 160 L 400 160 M 0 200 L 400 200 M 0 240 L 400 240 M 0 280 L 400 280 M 0 320 L 400 320 M 0 360 L 400 360" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
  <path d="M 40 0 L 40 400 M 80 0 L 80 400 M 120 0 L 120 400 M 160 0 L 160 400 M 200 0 L 200 400 M 240 0 L 240 400 M 280 0 L 280 400 M 320 0 L 320 400 M 360 0 L 360 400" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
  
  <!-- Outer glowing rings -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="10 5" />
  <circle cx="200" cy="200" r="115" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" />
  
  <!-- Portrait / Character representation -->
  <g transform="translate(100, 100)">
    <!-- Base shadow -->
    <ellipse cx="100" cy="180" rx="60" ry="15" fill="rgba(0,0,0,0.15)" />
    
    <!-- Shoulders -->
    <path d="M 40 180 C 40 140, 160 140, 160 180 Z" fill="url(#avatarGrad)" />
    
    <!-- Neck -->
    <rect x="88" y="115" width="24" height="30" rx="5" fill="#e2e8f0" />
    
    <!-- Head/Face -->
    <circle cx="100" cy="85" r="45" fill="#f8fafc" />
    
    <!-- Hair (Stylish Dev) -->
    <path d="M 55 80 C 50 40, 110 30, 140 45 C 145 55, 145 65, 140 70 C 130 55, 100 50, 75 75 Z" fill="#1e1b4b" />
    
    <!-- Glasses -->
    <rect x="70" y="75" width="24" height="16" rx="4" fill="none" stroke="#1e1b4b" stroke-width="3" />
    <rect x="106" y="75" width="24" height="16" rx="4" fill="none" stroke="#1e1b4b" stroke-width="3" />
    <line x1="94" y1="83" x2="106" y2="83" stroke="#1e1b4b" stroke-width="3" />
    
    <!-- Friendly Smile -->
    <path d="M 90 105 Q 100 115 110 105" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- "VARUN" Text inside SVG -->
  <rect x="110" y="315" width="180" height="32" rx="16" fill="#1e1b4b" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
  <text x="200" y="336" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">BHOPE VARUN</text>
</svg>
